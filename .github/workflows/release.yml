name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            output: vulnsky-windows-amd64.exe
          - goos: windows
            goarch: arm64
            output: vulnsky-windows-arm64.exe
          - goos: linux
            goarch: amd64
            output: vulnsky-linux-amd64
          - goos: linux
            goarch: arm64
            output: vulnsky-linux-arm64
          - goos: darwin
            goarch: amd64
            output: vulnsky-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: vulnsky-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        id: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          module_path="$(go list -m)"
          ldflags="-s -w -X ${module_path}/internal/version.Version=${GITHUB_REF_NAME} -X ${module_path}/internal/version.Commit=${GITHUB_SHA} -X ${module_path}/internal/version.BuildDate=${build_date}"
          go build -trimpath -buildvcs=false -ldflags="${ldflags}" -o "dist/${{ matrix.output }}" ./cmd/vulnsky
          if [ "${{ matrix.goos }}" = "windows" ]; then
            archive="${{ matrix.output }}"
            archive="${archive%.exe}.zip"
            if command -v zip >/dev/null 2>&1; then
              (cd dist && zip -9 "$archive" "${{ matrix.output }}")
            else
              python3 -c 'import sys, zipfile; archive, binary = sys.argv[1], sys.argv[2]; z=zipfile.ZipFile("dist/"+archive, "w", zipfile.ZIP_DEFLATED); z.write("dist/"+binary, binary); z.close()' "$archive" "${{ matrix.output }}"
            fi
          else
            archive="${{ matrix.output }}.tar.gz"
            tar -czf "dist/$archive" -C dist "${{ matrix.output }}"
          fi
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.archive }}
          path: dist/${{ steps.build.outputs.archive }}

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            支持平台:
            - Windows 10/11: amd64, arm64
            - Linux (Debian/Ubuntu/Fedora): amd64, arm64
            - macOS: amd64, arm64

            附件包含各平台归档包和 SHA256SUMS。发布构建使用 `-trimpath`、`-buildvcs=false` 和 `-ldflags "-s -w"` 缩减体积并避免嵌入本地构建路径。
